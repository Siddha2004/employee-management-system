# Production Configuration for Render

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.example.employeemanagementsystem=INFO

# CORS Configuration
server.servlet.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
server.servlet.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
server.servlet.cors.allowed-headers=*
server.servlet.cors.allow-credentials=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
