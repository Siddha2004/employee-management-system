services:
  - type: web
    name: ems-backend
    runtime: docker
    repo: https://github.com/your-username/your-repo  # Replace with your GitHub repo URL
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.H2Dialect
      - key: PORT
        value: "10000"
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-frontend-url  # Replace with your Vercel frontend URL
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
